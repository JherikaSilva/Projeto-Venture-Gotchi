{% extends "base.html" %}
{% block content %}

<div class="container py-4">
  <h2 class="mb-3">Nova Missão</h2>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post" novalidate>
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Título</label>
          {{ form.title }}
        </div>

        <div class="mb-3">
          <label class="form-label">Descrição</label>
          {{ form.description }}
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label">Prazo</label>
            {{ form.deadline }}
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label">Tipo</label>
            {{ form.mission_type }}
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label">Trilha</label>
            {{ form.track }}
          </div>
        </div>

        <button class="btn btn-primary">Criar Missão</button>
        <a href="/dashboard/" class="btn btn-outline-secondary ms-2">Voltar</a>
      </form>
    </div>
  </div>
</div>

{% endblock %}
