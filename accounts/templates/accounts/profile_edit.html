{% extends "base.html" %}
{% block content %}
<div class="container py-4">

    <h3 class="mb-3">Editar Perfil</h3>

    <div class="vg-card">
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Bio</label>
                    {{ form.bio }}
                </div>
                <div class="form-check mb-3">
                    {{ form.is_public_profile }}
                    <label class="form-check-label">Tornar meu perfil público (opcional)</label>
                </div>

                <div class="mb-3">
                    <label class="form-label">Interesses</label>
                    {{ form.interests }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Avatar</label>
                    {{ form.avatar }}
                    <div class="form-text">Envie uma imagem (png/jpeg). Opcional.</div>
                </div>

                <button class="btn btn-success">Salvar</button>
                <a href="{% url 'profile' %}" class="btn btn-secondary">Cancelar</a>
            </form>
        </div>
    </div>

</div>
{% endblock %}
