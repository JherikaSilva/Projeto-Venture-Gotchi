{% extends 'base.html' %}
{% load static %}

{% block title %}Login — VentureGotchi{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow-sm p-4">

            <h2 class="text-center fw-bold mb-4">Entrar</h2>

            <!-- Exibir erros do Django AuthenticationForm -->
            {% if form.errors %}
            <div class="alert alert-danger">
                Usuário ou senha incorretos. Tente novamente.
            </div>
            {% endif %}

            <form method="POST" novalidate>
                {% csrf_token %}

                <div class="mb-3">
                    <label for="id_username" class="form-label">Usuário</label>
                    <input type="text" name="username" class="form-control"
                        id="id_username" required>
                </div>

                <div class="mb-3">
                    <label for="id_password" class="form-label">Senha</label>
                    <div class="input-group">
                        <input type="password" name="password" class="form-control"
                            id="passwordField" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            👁
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 fw-bold">
                    Entrar
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="#" class="text-decoration-none">Esqueceu a senha?</a>
            </div>

        </div>
    </div>
</div>

<!-- Script para mostrar / ocultar senha -->
<script>
document.getElementById("togglePassword").addEventListener("click", function() {
    const passwordField = document.getElementById("passwordField");
    if (passwordField.type === "password") {
        passwordField.type = "text";
        this.textContent = "🙈";
    } else {
        passwordField.type = "password";
        this.textContent = "👁";
    }
});
</script>

{% endblock %}
