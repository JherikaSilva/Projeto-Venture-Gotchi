{% extends "base.html" %}
{% block content %}
<h3 class="mb-3">🏆 Ranking</h3>

<table class="table table-striped">
  <thead>
    <tr>
      <th>#</th>
      <th>Usuário</th>
      <th>Nível</th>
      <th>XP</th>
    </tr>
  </thead>
  <tbody>
    {% for u in top_users %}
    <tr {% if u.id == user.id %}class="table-warning"{% endif %}>
      <td>{{ forloop.counter }}</td>
      <td>{{ u.username }}</td>
      <td>{{ u.level }}</td>
      <td>{{ u.xp }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
